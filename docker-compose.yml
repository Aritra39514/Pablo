version: '3.8'

services:
  # Infrastructure Services
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana:/etc/grafana/provisioning

  # Application Services
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service
      - inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  user-service:
    build: ./services/user-service
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/userdb?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  product-service:
    build: ./services/product-service
    ports:
      - "8082:8082"
    depends_on:
      - mongodb
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/productdb?authSource=admin

  order-service:
    build: ./services/order-service
    ports:
      - "8083:8083"
    depends_on:
      - mongodb
      - kafka
      - inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/orderdb?authSource=admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - INVENTORY_SERVICE_URL=inventory-service:50051

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "8084:8084"
      - "50051:50051"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/inventorydb?authSource=admin

  notification-service:
    build: ./services/notification-service
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      - api-gateway
    environment:
      - API_BASE_URL=http://localhost:8080

volumes:
  mongodb_data:
  redis_data:
  grafana_data: