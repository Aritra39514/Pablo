syntax = "proto3";

package inventory;

// Inventory Service
service InventoryService {
    rpc CheckAvailability(AvailabilityRequest) returns (AvailabilityResponse);
    rpc ReserveItems(ReservationRequest) returns (ReservationResponse);
    rpc ReleaseReservation(ReleaseRequest) returns (ReleaseResponse);
    rpc UpdateStock(UpdateStockRequest) returns (UpdateStockResponse);
    rpc GetStock(GetStockRequest) returns (GetStockResponse);
}

// Messages
message AvailabilityRequest {
    repeated InventoryItem items = 1;
}

message AvailabilityResponse {
    bool available = 1;
    repeated InventoryItem unavailable_items = 2;
    string message = 3;
}

message ReservationRequest {
    string order_id = 1;
    repeated InventoryItem items = 2;
}

message ReservationResponse {
    bool success = 1;
    string reservation_id = 2;
    string message = 3;
}

message ReleaseRequest {
    string reservation_id = 1;
}

message ReleaseResponse {
    bool success = 1;
    string message = 2;
}

message UpdateStockRequest {
    string product_id = 1;
    int32 quantity = 2;
    string operation = 3; // "ADD" or "SUBTRACT"
}

message UpdateStockResponse {
    bool success = 1;
    int32 new_quantity = 2;
    string message = 3;
}

message GetStockRequest {
    string product_id = 1;
}

message GetStockResponse {
    string product_id = 1;
    int32 quantity = 2;
    int32 reserved = 3;
    int32 available = 4;
}

message InventoryItem {
    string product_id = 1;
    int32 quantity = 2;
}