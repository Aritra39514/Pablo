server:
  port: 8081

spring:
  application:
    name: user-service
  
  data:
    mongodb:
      uri: mongodb://localhost:27017/userdb
      auto-index-creation: true
    
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  security:
    jwt:
      secret: mySecretKey123456789012345678901234567890
      expiration: 86400000 # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true

logging:
  level:
    com.ecommerce.userservice: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:password@mongodb:27017/userdb?authSource=admin}
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}